name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'  # 每天凌晨 00:00（北京时间），即 UTC 16:00

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        echo "BUILD_VERSION=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      timeout-minutes: 20
      run: |
        cd openwrt
        make defconfig
        # make defconfig 会用 Kconfig 默认值覆盖 CONFIG_VERSION_NUMBER，
        # 必须在 defconfig 之后再次写入版本号。
        sed -i '/^CONFIG_VERSION_NUMBER=/d' .config
        echo "CONFIG_VERSION_NUMBER=\"${{ env.BUILD_VERSION }}\"" >> .config
        echo "[版本注入] CONFIG_VERSION_NUMBER = ${{ env.BUILD_VERSION }}"
        
        # 第一次多线程下载
        make download -j8
        # 清理下载失败的残缺文件
        find dl -size -1024c -exec rm -f {} \;
        
        # 【关键修复】查漏补缺：用单线程+详细日志，死磕那些没下载成功的包
        # 增加重试机制：如果单线程下载仍失败，等待 3 秒后再次尝试
        make download -j1 V=s || (echo "下载仍有失败，等待 3 秒后最后一次重试..." && sleep 3 && make download -j1 V=s)

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Fix VMDK for ESXi
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        find openwrt/bin/targets/ -name "*.vmdk" | while read vmdk; do
          dir="$(dirname "$vmdk")"
          base="$(basename "$vmdk" .vmdk)"
          raw="${dir}/${base}.raw"
          out="${dir}/${base}-esxi.vmdk"
          echo "Converting $vmdk → raw..."
          qemu-img convert -f vmdk -O raw "$vmdk" "$raw"
          echo "Resizing to 2G..."
          qemu-img resize "$raw" 2G
          echo "Converting to VMDK (monolithicSparse) for ESXi datastore..."
          qemu-img convert -f raw -O vmdk -o subformat=monolithicSparse "$raw" "$out"
          rm -f "$raw"
          # 替换原文件
          mv "$out" "$vmdk"
          echo "Done: $vmdk (monolithicSparse, 2G)"
        done

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        # 提取需要保留格式的文件到临时目录
        mkdir -p /tmp/keep_firmware
        
        # 1. 捞取核心固件 (优先抓取转换好的 ESXi 专属 vmdk)
        mv *-esxi.vmdk /tmp/keep_firmware/ 2>/dev/null || true
        mv *squashfs-combined-efi.img.gz /tmp/keep_firmware/ 2>/dev/null || true
        
        # 兜底匹配：如果没有上述特定后缀，再抓全量，防止空包
        mv *.vmdk /tmp/keep_firmware/ 2>/dev/null || true
        mv *.img.gz /tmp/keep_firmware/ 2>/dev/null || true
        
        # 2. 捞取“体积为0”但极具价值的版本校验文件
        mv sha256sums /tmp/keep_firmware/ 2>/dev/null || true
        mv config.buildinfo /tmp/keep_firmware/ 2>/dev/null || true
        mv profiles.json /tmp/keep_firmware/ 2>/dev/null || true
        
        # 3. 霸气清场：删除所有其他不需要的臃肿文件夹(如 packages)和 raw 文件
        rm -rf *
        
        # 4. 将保留的文件移回原位
        mv /tmp/keep_firmware/* . 2>/dev/null || true
        rm -rf /tmp/keep_firmware
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=${{ env.BUILD_VERSION }}" >> $GITHUB_OUTPUT
        touch release.txt
        echo "✅ Build completed at $(date +"%Y-%m-%d %H:%M")" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
